                <ul class="navbar-nav ms-auto">

    <!-- CONTEÚDO -->
    <div class="container mt-4">
        <h2>Cadastro de Filmes</h2>
        <hr>

        <div class="row">
            <div class="col-md-4">
                <input id="titulo" class="form-control" placeholder="Título"><br>
            </div>
            <div class="col-md-4">
                <input id="genero" class="form-control" placeholder="Gênero"><br>
            </div>
            <div class="col-md-4">
                <textarea id="descricao" class="form-control" placeholder="Descrição"></textarea><br>
            </div>
            <div class="col-md-4">
                <select id="classificacao" class="form-control">
                    <option value="Livre">Livre</option>
                    <option value="18+">18+</option>
                </select><br>
            </div>
            <div class="col-md-4">
                <input id="duracao" type="number" class="form-control" placeholder="Duração (minutos)"><br>
            </div>
            <div class="col-md-4">
                <input id="estreia" type="date" class="form-control"><br>
            </div>
        </div>

        <button type="button" onclick="salvarFilme()" class="btn btn-primary">
            Salvar Filme
        </button>
    </div>

    <!-- SCRIPTS -->
