    <!-- CONTEÚDO -->
    <div class="container mt-4">
        <h2>Cadastro de Sessões</h2>
        <hr>

        <div class="row justify-content-center">
            <div class="col-md-4">

                <select id="filme" class="form-control"></select><br>

                <select id="sala" class="form-control"></select><br>

                <input id="data" type="datetime-local" class="form-control"><br>

                <input id="preco" type="number" class="form-control" placeholder="Preço"><br>

                <select id="idioma" class="form-control">
                    <option value="">Selecione o idioma</option>
                    <option value="Dublado">Dublado</option>
                    <option value="Legendado">Legendado</option>
                </select><br>

                <select id="formato" class="form-control">
                    <option value="">Selecione o formato</option>
                    <option value="2D">2D</option>
                    <option value="3D">3D</option>
                </select><br>

                <button type="button" onclick="salvarSessao()" class="btn btn-primary w-100">
                    Salvar Sessão
                </button>

            </div>
        </div>
    </div>

    <body class="cadastro-sessoes">
